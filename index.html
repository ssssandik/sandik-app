<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sandik – Building Contribution Manager</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        try {
          const currentFetch = window.fetch;
          if (currentFetch) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return currentFetch; },
              set: function(v) { 
                console.warn('Something tried to overwrite window.fetch. Ignoring to prevent crash.');
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Failed to patch fetch descriptor:', e);
        }

        // Prevent formdata-polyfill from attempting to overwrite window.fetch
        // It only tries to patch fetch if FormData.prototype.keys is missing.
        if (typeof window !== 'undefined' && window.FormData && !window.FormData.prototype.keys) {
          const noop = function() { 
            return {
              [Symbol.iterator]: function() { return this; },
              next: function() { return { done: true }; }
            };
          };
          window.FormData.prototype.keys = window.FormData.prototype.keys || noop;
          window.FormData.prototype.values = window.FormData.prototype.values || noop;
          window.FormData.prototype.entries = window.FormData.prototype.entries || noop;
          if (typeof Symbol !== 'undefined' && Symbol.iterator) {
            window.FormData.prototype[Symbol.iterator] = window.FormData.prototype[Symbol.iterator] || noop;
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
